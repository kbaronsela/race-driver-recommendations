    const tbody = document.getElementById('tbody');
    const searchEl = document.getElementById('search');
    const fieldFilter = document.getElementById('fieldFilter');
    const countEl = document.getElementById('count');

    const fields = [...new Set(data.map(r => r.field || '').filter(Boolean))].sort();
    const noFieldOpt = document.createElement('option');
    noFieldOpt.value = '__no_field__';
    noFieldOpt.textContent = 'ללא תחום';
    fieldFilter.appendChild(noFieldOpt);
    fields.forEach(f => {
      const opt = document.createElement('option');
      opt.value = f;
      opt.textContent = f;
      fieldFilter.appendChild(opt);
    });

    function phoneList(r) {
      if (Array.isArray(r.phones) && r.phones.length) return r.phones;
      return r.phone ? [r.phone] : [];
    }
    function formatPhoneLinks(r) {
      const list = phoneList(r);
      if (!list.length) return '—';
      return list.map(display => {
        const digits = (display || '').replace(/\D/g, '');
        const tel = digits ? 'tel:+972' + (digits.startsWith('0') ? digits.slice(1) : digits) : '';
        return tel ? `<a href="${tel}">${escapeHtml(display)}</a>` : escapeHtml(display);
      }).join(' <span class="phone-sep">·</span> ');
    }
    function render(rows) {
      tbody.innerHTML = rows.map(r => {
        const name = escapeHtml(r.name || '');
        const field = escapeHtml(r.field || '');
        const extra = escapeHtml(r['extra_info'] || '');
        const note = escapeHtml((r.note || '').slice(0, 400)) + ((r.note || '').length > 400 ? '…' : '');
        const moshav = r.from_moshav ? '<span class="moshav-badge" role="img" aria-label="מהמושב" title="מהמושב"><span class="moshav-badge-star" aria-hidden="true">★</span><span class="moshav-badge-text">מהמושב</span></span>' : '';
        return `<tr>
          <td>${name}</td>
          <td class="phone">${formatPhoneLinks(r)}</td>
          <td class="field ${!r.field ? 'empty' : ''}">${field || '—'}</td>
          <td class="field ${!r['extra_info'] ? 'empty' : ''}">${extra || '—'}</td>
          <td>${moshav}</td>
          <td class="note">${note || '—'}</td>
        </tr>`;
      }).join('');
      countEl.textContent = rows.length + ' מתוך ' + data.length;
    }

    function escapeHtml(s) {
      const div = document.createElement('div');
      div.textContent = s;
      return div.innerHTML;
    }

    function filterRows() {
      const q = (searchEl.value || '').trim().toLowerCase();
      const fieldVal = fieldFilter.value;
      const rows = data.filter(r => {
        const matchField = !fieldVal ? true : (fieldVal === '__no_field__' ? !(r.field && r.field.trim()) : (r.field || '') === fieldVal);
        if (!matchField) return false;
        if (!q) return true;
        const haystack = [
          r.name || '',
          r.phone || '',
          ...(Array.isArray(r.phones) ? r.phones : []),
          r.field || '',
          String(r['extra_info'] ?? ''),
          r.note || ''
        ].join(' ').toLowerCase();
        return haystack.includes(q);
      });
      render(rows);
    }

    searchEl.addEventListener('input', filterRows);
    searchEl.addEventListener('keyup', filterRows);
    fieldFilter.addEventListener('change', filterRows);
    filterRows();
  </script>
