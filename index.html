<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>נהגת מרוצים – דף הבית</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/site.css">
  <script src="assets/site-sidebar.js" defer></script>
  <style>
    :root {
      --bg: #f0f4fb;
      --surface: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --border: #e2e8f0;
    }
    .container { max-width: 720px; margin: 0 auto; padding: 2rem 1.5rem; }
    .home-hero {
      text-align: center;
      padding: 1rem 0 2.5rem;
    }
    .home-hero-logo {
      width: min(88vw, 440px);
      height: auto;
      max-height: min(42vh, 320px);
      object-fit: contain;
      margin: 0 auto 1.75rem;
      display: block;
      filter: drop-shadow(0 16px 48px rgba(15, 23, 42, 0.14));
    }
    .home-hero-title {
      font-size: clamp(2.25rem, 7vw, 3.5rem);
      font-weight: 700;
      margin: 0;
      letter-spacing: -0.045em;
      line-height: 1.1;
      color: var(--heading, #0f766e);
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.6);
    }
    .hidden { display: none !important; }
    .muted { color: var(--muted); }
    .modal { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.45); display: flex; align-items: center; justify-content: center; z-index: 200; padding: 1rem; backdrop-filter: blur(4px); }
    .modal-inner { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem; max-width: 400px; width: 100%; box-shadow: 0 24px 60px rgba(15, 23, 42, 0.2); }
    .modal h3 { margin: 0 0 1rem; }
    .form-row { margin-bottom: 1rem; }
    .form-row label { display: block; margin-bottom: 0.35rem; color: var(--muted); font-size: 0.9rem; }
    .form-row input { width: 100%; padding: 0.55rem 0.65rem; border: 1px solid var(--border); border-radius: 10px; background: #fff; color: var(--text); font: inherit; box-sizing: border-box; }
    .modal-actions { margin-top: 1.25rem; display: flex; gap: 0.5rem; justify-content: flex-end; flex-wrap: wrap; }
    .modal-actions .btn {
      padding: 0.5rem 1rem; border-radius: 10px; border: 1px solid var(--border); background: var(--surface); font: inherit; cursor: pointer;
    }
    .modal-actions .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    @media (min-width: 769px) {
      /* שורת לוגואים+תפריט רק במובייל; בדסקטופ נשאר ה־hero בלי כפילות */
      .header-row--with-menu { display: none; }
    }
    @media (max-width: 768px) {
      .container { padding: 1.25rem 1rem; }
      .home-hero { padding: 0.5rem 0 3rem; }
    }
  </style>
</head>
<body>
  <div class="site-shell">
    <aside class="site-sidebar" aria-label="ניווט ראשי">
      <div class="site-sidebar-panel" id="site-sidebar-panel">
      <nav class="site-sidebar-nav site-sidebar-nav-site-home" aria-label="כללי">
        <a href="index.html" class="is-current" aria-current="page"><span class="nav-emoji" aria-hidden="true">🏠</span><span class="nav-label">דף הבית</span></a>
      </nav>
      <a href="recommendations.html" class="site-sidebar-section-title site-sidebar-section-link" aria-label="דף המלצות — בחירת קטגוריה"><span class="section-emoji" aria-hidden="true">⭐</span><span class="section-label">המלצות</span></a>
      <nav class="site-sidebar-nav site-sidebar-nav-recommendations" aria-label="המלצות">
        <a href="professionals.html"><span class="nav-emoji" aria-hidden="true">🛠️</span><span class="nav-label">בעלי מקצוע</span></a>
        <a href="restaurants.html"><span class="nav-emoji" aria-hidden="true">🍽️</span><span class="nav-label">מסעדות</span></a>
      </nav>
      <nav class="site-sidebar-nav site-sidebar-nav-info" aria-label="מידע">
        <a href="info.html"><span class="nav-emoji" aria-hidden="true">ℹ️</span><span class="nav-label">מידע</span></a>
      </nav>
      <nav class="site-sidebar-nav site-sidebar-nav-links" aria-label="קישורים">
        <a href="links.html"><span class="nav-emoji" aria-hidden="true">🔗</span><span class="nav-label">קישורים</span></a>
      </nav>
      <div class="site-sidebar-footer">
        <div class="sidebar-auth">
          <div id="loginArea" class="login-wrap hidden">
            <button type="button" class="btn" id="btnLogin">התחבר</button>
          </div>
          <div id="loggedArea" class="logged-row hidden">
            <span class="muted">מחובר</span>
            <button type="button" class="btn" id="btnLogout">התנתק</button>
          </div>
        </div>
      </div>
      </div>
    </aside>
    <main class="site-main">
      <div class="container">
        <div class="header-row header-row--with-menu">
          <button type="button" class="site-sidebar-menu-toggle" id="site-sidebar-menu-btn" aria-expanded="false" aria-controls="site-sidebar-panel" aria-label="פתח תפריט ניווט">
            <span class="site-sidebar-menu-toggle-emoji" aria-hidden="true">☰</span>
            <span class="site-sidebar-menu-toggle-text">תפריט</span>
          </button>
          <div class="header-logos-wrap">
            <div class="header-logos">
              <img src="assets/logo-moshav.png" alt="מושב שדה ורבורג" class="logo logo-moshav" onerror="this.style.display='none'">
              <img src="assets/logo-race-driver.png" alt="נהגת מירוצים" class="logo logo-race-driver" onerror="this.style.display='none'">
            </div>
          </div>
        </div>
        <header class="home-hero">
          <img src="assets/logo-race-driver.png" alt="לוגו נהגת מרוצים" class="home-hero-logo" width="440" height="320" onerror="this.style.display='none'">
          <h1 class="home-hero-title">נהגת מרוצים</h1>
        </header>
      </div>
    </main>
  </div>

  <div id="modalLogin" class="modal hidden">
    <div class="modal-inner">
      <h3>התחברות</h3>
      <p class="muted" style="font-size:0.9rem;margin:0 0 1rem;">אותו משתמש וסיסמה כמו בעמוד העריכה.</p>
      <div class="form-row">
        <label>משתמש</label>
        <input type="text" id="loginUserModal" placeholder="משתמש" autocomplete="username">
      </div>
      <div class="form-row">
        <label>סיסמה</label>
        <input type="password" id="loginPassModal" placeholder="סיסמה" autocomplete="current-password">
      </div>
      <div class="modal-actions">
        <button type="button" class="btn" id="btnLoginCancel">ביטול</button>
        <button type="button" class="btn btn-primary" id="btnLoginSubmit">התחבר</button>
      </div>
    </div>
  </div>

  <script>
    const API = '';
    let token = sessionStorage.getItem('token') || '';
    let hasEditMode = false;

    function syncAuthUI() {
      if (!hasEditMode) {
        document.getElementById('loginArea').classList.add('hidden');
        document.getElementById('loggedArea').classList.add('hidden');
        return;
      }
      if (token) {
        document.getElementById('loggedArea').classList.remove('hidden');
        document.getElementById('loginArea').classList.add('hidden');
      } else {
        document.getElementById('loginArea').classList.remove('hidden');
        document.getElementById('loggedArea').classList.add('hidden');
      }
    }

    async function initAuth() {
      try {
        const r = await fetch(API + 'api/entries');
        const data = await r.json();
        hasEditMode = data.has_edit_mode === true;
      } catch (e) {
        hasEditMode = false;
      }
      const foot = document.querySelector('.site-sidebar-footer');
      if (foot) foot.style.display = hasEditMode ? '' : 'none';
      syncAuthUI();
    }

    async function doLoginSubmit() {
      const user = document.getElementById('loginUserModal').value.trim();
      const pass = document.getElementById('loginPassModal').value;
      const r = await fetch(API + 'api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ user, password: pass })
      });
      const data = await r.json().catch(function() { return {}; });
      if (r.ok && data.token) {
        token = data.token;
        sessionStorage.setItem('token', token);
        document.getElementById('modalLogin').classList.add('hidden');
        syncAuthUI();
      } else {
        alert(data.error || 'התחברות נכשלה');
      }
    }

    document.getElementById('btnLogin').addEventListener('click', function() {
      document.getElementById('modalLogin').classList.remove('hidden');
      setTimeout(function() { document.getElementById('loginUserModal').focus(); }, 50);
    });
    document.getElementById('btnLoginCancel').addEventListener('click', function() {
      document.getElementById('modalLogin').classList.add('hidden');
    });
    document.getElementById('btnLoginSubmit').addEventListener('click', doLoginSubmit);
    document.getElementById('btnLogout').addEventListener('click', function() {
      token = '';
      sessionStorage.removeItem('token');
      syncAuthUI();
    });
    document.getElementById('modalLogin').addEventListener('keydown', function(e) {
      if (e.key === 'Escape') document.getElementById('btnLoginCancel').click();
      else if (e.key === 'Enter' && e.target.id !== 'btnLoginCancel') {
        e.preventDefault();
        doLoginSubmit();
      }
    });

    initAuth();
  </script>
</body>
</html>
