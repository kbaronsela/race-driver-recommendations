  <style>
    :root {
      --bg: #f0f4fb;
      --surface: #ffffff;
      --text: #1a2d4a;
      --muted: #5a7a9e;
      --border: #cbd5e1;
    }
    .container { max-width: 720px; margin: 0 auto; padding: 1.5rem; }
    h1 { font-size: 1.75rem; font-weight: 700; margin: 0 0 1.25rem; color: var(--text); letter-spacing: -0.02em; }
    .links-list { display: flex; flex-direction: column; gap: 0.85rem; }
    .link-card {
      display: flex; align-items: flex-start; gap: 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.1rem 1.2rem;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
      box-shadow: 0 4px 16px rgba(15, 23, 42, 0.06);
    }
    .link-card:hover {
      border-color: var(--heading-border-strong);
      box-shadow: 0 8px 28px var(--heading-shadow);
      transform: translateY(-1px);
    }
    .link-card .emoji { font-size: 1.75rem; line-height: 1; flex-shrink: 0; }
    .link-card .body { min-width: 0; flex: 1 1 auto; }
    .link-card .title { font-weight: 700; font-size: 1.05rem; color: var(--heading); margin: 0; }
    /* שורת כותרת: ב־RTL הכותרת מימין, החץ משמאל; תג וואטסאפ צמוד לכותרת (לא לחץ); במובייל התג בשורה מתחת, רוחב טבעי */
    .link-card-head {
      display: flex;
      flex-wrap: nowrap;
      align-items: center;
      gap: 0.5rem 0.65rem;
      width: 100%;
    }
    .link-card-head-main {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.45rem 0.65rem;
      flex: 1 1 auto;
      min-width: 0;
      justify-content: flex-start;
    }
    .link-card-head .title {
      flex: 1 1 auto;
      min-width: 0;
      text-align: right;
    }
    .link-card-head-main .title {
      flex: 1 1 auto;
    }
    .link-card-head .arrow {
      flex-shrink: 0;
      font-size: 1.05rem;
      line-height: 1;
      color: var(--heading);
      font-weight: 600;
    }
    /* אליפסה (pill) — גבול ירוק, ללא מילוי */
    .link-kind--whatsapp {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--wa-green);
      background: transparent;
      border: 1.5px solid var(--wa-green);
      padding: 0.3rem 0.72rem;
      border-radius: 999px;
      margin: 0;
      line-height: 1.2;
      flex-shrink: 0;
      box-sizing: border-box;
    }
    .link-kind--whatsapp .wa-icon {
      flex-shrink: 0;
      width: 1rem;
      height: 1rem;
      display: block;
      color: var(--wa-green);
    }
    @media (max-width: 768px) {
      .link-card-head:not(:has(.link-card-head-main)) {
        flex-wrap: wrap;
      }
      .link-card-head:has(.link-card-head-main) {
        display: grid;
        grid-template-columns: 1fr auto;
        grid-template-rows: auto auto;
        gap: 0.35rem 0.5rem;
        align-items: center;
      }
      .link-card-head-main {
        display: contents;
      }
      .link-card-head:has(.link-card-head-main) .title {
        grid-column: 1;
        grid-row: 1;
      }
      .link-card-head:has(.link-card-head-main) .arrow {
        grid-column: 2;
        grid-row: 1;
      }
      .link-card-head:has(.link-card-head-main) .link-kind--whatsapp {
        grid-column: 1;
        grid-row: 2;
        justify-self: start;
        width: auto;
        max-width: 100%;
        margin-top: 0;
      }
      .link-card-head:not(:has(.link-card-head-main)) .title {
        order: 1;
      }
      .link-card-head:not(:has(.link-card-head-main)) .arrow {
        order: 2;
      }
    }
    .hidden { display: none !important; }
    .muted { color: var(--muted); }
    .modal { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.45); display: flex; align-items: center; justify-content: center; z-index: 200; padding: 1rem; backdrop-filter: blur(4px); }
    .modal-inner { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem; max-width: 400px; width: 100%; box-shadow: 0 24px 60px rgba(15, 23, 42, 0.2); }
    .modal h3 { margin: 0 0 1rem; }
    .form-row { margin-bottom: 1rem; }
    .form-row label { display: block; margin-bottom: 0.35rem; color: var(--muted); font-size: 0.9rem; }
    .form-row input { width: 100%; padding: 0.55rem 0.65rem; border: 1px solid var(--border); border-radius: 10px; background: #fff; color: var(--text); font: inherit; box-sizing: border-box; }
    .modal-actions { margin-top: 1.25rem; display: flex; gap: 0.5rem; justify-content: flex-end; flex-wrap: wrap; }
    .modal-actions .btn {
      padding: 0.5rem 1rem; border-radius: 10px; border: 1px solid var(--border); background: var(--surface); font: inherit; cursor: pointer;
    }
    .modal-actions .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    @media (max-width: 768px) {
      .container { padding: 1rem; }
      h1 { font-size: 1.4rem; }
    }
  </style>

      </div>
      <div class="form-row">
        <label>סיסמה</label>
        <input type="password" id="loginPassModal" placeholder="סיסמה" autocomplete="current-password">
      </div>
      <div class="modal-actions">

        <button type="button" class="btn btn-primary" id="btnLoginSubmit">התחבר</button>
      </div>
    </div>

  <script>
    const API = '';
    let token = sessionStorage.getItem('token') || '';
    let hasEditMode = false;

    function syncAuthUI() {
      if (!hasEditMode) {
        document.getElementById('loginArea').classList.add('hidden');
        document.getElementById('loggedArea').classList.add('hidden');
        return;
      }
      if (token) {
        document.getElementById('loggedArea').classList.remove('hidden');
        document.getElementById('loginArea').classList.add('hidden');
      } else {
        document.getElementById('loginArea').classList.remove('hidden');
        document.getElementById('loggedArea').classList.add('hidden');
      }
    }

    async function initAuth() {
      try {
        const r = await fetch(API + 'api/entries');
        const data = await r.json();
        hasEditMode = data.has_edit_mode === true;
      } catch (e) {
        hasEditMode = false;
      }
      const authFoot = document.querySelector('.sidebar-auth');
      if (authFoot) authFoot.style.display = hasEditMode ? '' : 'none';
      syncAuthUI();
    }

    function clearLoginModalError() {
      var el = document.getElementById('loginModalError');
      if (el) {
        el.textContent = '';
        el.classList.add('hidden');
      }
    }

    async function doLoginSubmit() {
      clearLoginModalError();
      var errEl = document.getElementById('loginModalError');
      const user = document.getElementById('loginUserModal').value.trim();
      const pass = document.getElementById('loginPassModal').value;
      try {
        const r = await fetch(API + 'api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ user, password: pass })
        });
        const data = await r.json().catch(function() { return {}; });
        if (r.ok && data.token) {
          token = data.token;
          sessionStorage.setItem('token', token);
          document.getElementById('modalLogin').classList.add('hidden');
          syncAuthUI();
        } else if (errEl) {
          errEl.textContent = (data && data.error) ? data.error : 'שם משתמש או סיסמה שגויים';
          errEl.classList.remove('hidden');
        }
      } catch (e) {
        if (errEl) {
          errEl.textContent = 'לא ניתן להתחבר כרגע. נסו שוב.';
          errEl.classList.remove('hidden');
        }
      }
    }

    document.getElementById('btnLogin').addEventListener('click', function() {
      clearLoginModalError();
      document.getElementById('modalLogin').classList.remove('hidden');
      setTimeout(function() { document.getElementById('loginUserModal').focus(); }, 50);
    });
    document.getElementById('btnLoginCancel').addEventListener('click', function() {
      clearLoginModalError();
      document.getElementById('modalLogin').classList.add('hidden');
    });
    document.getElementById('btnLoginSubmit').addEventListener('click', doLoginSubmit);
    document.getElementById('btnLogout').addEventListener('click', function() {
      token = '';
      sessionStorage.removeItem('token');
      syncAuthUI();
    });
    document.getElementById('modalLogin').addEventListener('keydown', function(e) {
      if (e.key === 'Escape') document.getElementById('btnLoginCancel').click();
      else if (e.key === 'Enter' && e.target.id !== 'btnLoginCancel') {
        e.preventDefault();
        doLoginSubmit();
      }
    });
    document.getElementById('modalLogin').addEventListener('click', function(e) {
      if (e.target === this) document.getElementById('btnLoginCancel').click();
    });

    initAuth();
  </script>
